<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card">
    <h3 style="margin-bottom:20px;font-size:18px;color:#333;">留言详情</h3>

    <table class="detail-table">
        <tr>
            <th width="120">姓名</th>
            <td>{$message.name}</td>
        </tr>
        <tr>
            <th>联系电话</th>
            <td>{$message.phone}</td>
        </tr>
        <tr>
            <th>电子邮箱</th>
            <td>{$message.email|default='未填写'}</td>
        </tr>
        <tr>
            <th>留言内容</th>
            <td style="white-space:pre-wrap;line-height:1.8;">{$message.content}</td>
        </tr>
        <tr>
            <th>提交时间</th>
            <td>{$message.create_time|date='Y-m-d H:i:s'}</td>
        </tr>
        <tr>
            <th>阅读状态</th>
            <td>{if condition="$message.is_read==0"}<span class="status-tag off">未读</span>{else/}<span class="status-tag on">已读</span>{/if}</td>
        </tr>
    </table>

    <div style="margin-top:24px;display:flex;gap:12px;">
        {if condition="$message.is_read==0"}
        <button onclick="setRead({$message.id})" class="btn btn-primary">标记已读</button>
        {/if}
        <a href="/admin/message" class="btn" style="background:#eee;">返回列表</a>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
function setRead(id) {
    $.post('/admin/message/setRead', {id: id}, function(res) {
        if (res.code == 1) {
            location.reload();
        } else {
            alert(res.msg);
        }
    }, 'json');
}
</script>
</body>
</html>
