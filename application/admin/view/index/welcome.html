<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card">
    <h3 style="font-size:20px;margin-bottom:20px;">📊 控制台</h3>
    <div class="dashboard-stats">
        <div class="dash-stat">
            <div class="num">{$stats.product_category}</div>
            <div class="label">产品分类</div>
        </div>
        <div class="dash-stat">
            <div class="num">{$stats.product}</div>
            <div class="label">产品总数</div>
        </div>
        <div class="dash-stat">
            <div class="num">{$stats.news_category}</div>
            <div class="label">新闻分类</div>
        </div>
        <div class="dash-stat">
            <div class="num">{$stats.news}</div>
            <div class="label">新闻总数</div>
        </div>
    </div>
    <div class="dashboard-stats" style="margin-top:20px;">
        <div class="dash-stat">
            <div class="num">{$stats.message}</div>
            <div class="label">留言总数</div>
        </div>
        <div class="dash-stat" style="cursor:pointer;" onclick="window.location.href='/admin/message'">
            <div class="num" style="color:#e63946;">{$stats.message_unread}</div>
            <div class="label">未读留言</div>
        </div>
    </div>
    <div style="padding:30px;background:#f8fbff;border-radius:8px;text-align:center;color:#999;">
        <p>欢迎使用鑫聚康电子科技后台管理系统</p>
        <p style="margin-top:8px;font-size:13px;">请通过左侧菜单进行管理操作</p>
    </div>
</div>
</body>
</html>
