<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 鑫聚康电子科技</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h2>鑫聚康后台管理</h2>
            <p class="sub">郑州鑫聚康电子科技有限公司</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" id="username" placeholder="请输入用户名" value="admin">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" id="password" placeholder="请输入密码" value="admin123">
                </div>
                <div id="loginMsg" style="color:#e63946;font-size:14px;margin-bottom:10px;display:none;"></div>
                <button type="submit" class="btn-login">登 录</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
    $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        var username = $('#username').val();
        var password = $('#password').val();
        if (!username || !password) {
            $('#loginMsg').text('请输入用户名和密码').show();
            return;
        }
        $.post('/admin/login', {username: username, password: password}, function(res) {
            if (res.code == 1) {
                window.location.href = '/admin/index';
            } else {
                $('#loginMsg').text(res.msg).show();
            }
        }, 'json');
    });
    </script>
</body>
</html>
