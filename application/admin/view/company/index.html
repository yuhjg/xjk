<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">公司信息设置</h3>
    <form id="companyForm" method="post" action="/admin/company" enctype="multipart/form-data">
        <div class="form-group">
            <label>公司名称</label>
            <input type="text" name="name" value="{$company.name|default='郑州鑫聚康电子科技有限公司'}">
        </div>
        <div class="form-group">
            <label>简称</label>
            <input type="text" name="short_name" value="{$company.short_name|default='鑫聚康'}">
        </div>
        <div class="form-group">
            <label>公司Logo</label>
            {if condition="$company && $company.logo"}
            <div style="margin-bottom:8px;"><img src="{$company.logo}" style="max-width:150px;max-height:80px;border-radius:4px;border:1px solid #eee;"></div>
            {/if}
            <input type="file" name="logo" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <p class="tip">不选择图片则保持原图不变</p>
        </div>
        <div class="form-group">
            <label>联系电话</label>
            <input type="text" name="phone" value="{$company.phone|default=''}">
        </div>
        <div class="form-group">
            <label>电子邮箱</label>
            <input type="text" name="email" value="{$company.email|default=''}">
        </div>
        <div class="form-group">
            <label>公司地址</label>
            <input type="text" name="address" value="{$company.address|default=''}">
        </div>
        <div class="form-group">
            <label>传真</label>
            <input type="text" name="fax" value="{$company.fax|default=''}">
        </div>
        <div class="form-group">
            <label>QQ</label>
            <input type="text" name="qq" value="{$company.qq|default=''}">
        </div>
        <div class="form-group">
            <label>微信号</label>
            <input type="text" name="wechat" value="{$company.wechat|default=''}">
        </div>
        <div class="form-group">
            <label>微信二维码</label>
            {if condition="$company && $company.wechat_qrcode"}
            <div style="margin-bottom:8px;"><img src="{$company.wechat_qrcode}" style="max-width:150px;max-height:150px;border-radius:4px;border:1px solid #eee;"></div>
            {/if}
            <input type="file" name="wechat_qrcode" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <p class="tip">不选择图片则保持原图不变</p>
        </div>
        <div class="form-group">
            <label>公司形象图</label>
            {if condition="$company && $company.company_image"}
            <div style="margin-bottom:8px;"><img src="{$company.company_image}" style="max-width:400px;max-height:200px;border-radius:4px;border:1px solid #eee;"></div>
            {/if}
            <input type="file" name="company_image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <p class="tip">用于"关于我们"页面的公司形象展示，建议尺寸800×500</p>
        </div>
        <div class="form-group">
            <label>备案号</label>
            <input type="text" name="icp" value="{$company.icp|default=''}">
        </div>
        <div class="form-group">
            <label>版权信息</label>
            <input type="text" name="copyright" value="{$company.copyright|default=''}">
        </div>
        <div class="form-group">
            <label>公司简介</label>
            <textarea name="intro" style="height:200px;">{$company.intro|default=''}</textarea>
        </div>
        <div class="form-group">
            <label>企业文化</label>
            <textarea name="culture" style="height:200px;">{$company.culture|default=''}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存设置</button>
        </div>
    </form>
</div>
</body>
</html>
