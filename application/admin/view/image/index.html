<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card">
    <div class="toolbar">
        <div class="left"><h3 style="font-size:18px;">图片管理</h3></div>
        <div class="right">
            <a href="/admin/image/add" class="btn btn-success">+ 添加图片</a>
        </div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th width="60">ID</th>
                <th width="120">图片</th>
                <th>标题</th>
                <th>分类</th>
                <th width="80">排序</th>
                <th width="80">状态</th>
                <th width="160">操作</th>
            </tr>
        </thead>
        <tbody>
            {volist name="images" id="img"}
            <tr>
                <td>{$img.id}</td>
                <td>
                    {if condition="$img.image"}
                    <img src="{$img.image}" class="thumb" alt="">
                    {else/}
                    <div class="thumb" style="display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;">暂无</div>
                    {/if}
                </td>
                <td>{$img.title}</td>
                <td>{$img.category|default='-'}</td>
                <td>{$img.sort}</td>
                <td>{if condition="$img.status==1"}<span class="status-tag on">显示</span>{else/}<span class="status-tag off">隐藏</span>{/if}</td>
                <td>
                    <div class="actions">
                        <a href="/admin/image/edit/{$img.id}" class="btn btn-primary btn-sm">编辑</a>
                        <button onclick="deleteImage({$img.id})" class="btn btn-danger btn-sm">删除</button>
                    </div>
                </td>
            </tr>
            {/volist}
        </tbody>
    </table>

    <div class="pagination">{$images|raw}</div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
function deleteImage(id) {
    if (!confirm('确定要删除吗？')) return;
    $.post('/admin/image/delete', {id: id}, function(res) {
        if (res.code == 1) {
            alert('删除成功');
            location.reload();
        } else {
            alert(res.msg);
        }
    }, 'json');
}
</script>
</body>
</html>
