<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">编辑图片</h3>
    <form id="imageForm" method="post" action="/admin/image/edit/{$image.id}" enctype="multipart/form-data">
        <div class="form-group">
            <label>图片标题 <span class="req">*</span></label>
            <input type="text" name="title" value="{$image.title}" placeholder="请输入图片标题" required>
        </div>
        <div class="form-group">
            <label>图片分类</label>
            <input type="text" name="category" value="{$image.category|default=''}" placeholder="如：公司形象、产品展示、资质证书等">
        </div>
        <div class="form-group">
            <label>上传图片</label>
            {if condition="$image.image"}
            <div style="margin-bottom:8px;"><img src="{$image.image}" style="max-width:400px;max-height:300px;border-radius:4px;border:1px solid #eee;"></div>
            {/if}
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <p class="tip">不选择图片则保持原图不变</p>
        </div>
        <div class="form-group">
            <label>链接地址</label>
            <input type="text" name="link" value="{$image.link|default=''}" placeholder="点击图片跳转的链接（可选）">
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea name="description" placeholder="图片描述（可选）">{$image.description|default=''}</textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="{$image.sort|default='0'}" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1" {if condition="$image.status==1"}selected{/if}>显示</option>
                <option value="0" {if condition="$image.status==0"}selected{/if}>隐藏</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="/admin/image" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>
