<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">添加图片</h3>
    <form id="imageForm" method="post" action="/admin/image/add" enctype="multipart/form-data">
        <div class="form-group">
            <label>图片标题 <span class="req">*</span></label>
            <input type="text" name="title" placeholder="请输入图片标题" required>
        </div>
        <div class="form-group">
            <label>图片分类</label>
            <input type="text" name="category" placeholder="如：公司形象、产品展示、资质证书等">
        </div>
        <div class="form-group">
            <label>上传图片</label>
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <div id="imagePreview" style="display:none;margin-top:8px;">
                <img id="previewImg" src="" style="max-width:400px;max-height:300px;border-radius:4px;border:1px solid #eee;">
            </div>
            <p class="tip">支持 JPG/PNG/GIF/BMP/WEBP 格式</p>
        </div>
        <div class="form-group">
            <label>链接地址</label>
            <input type="text" name="link" placeholder="点击图片跳转的链接（可选）">
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea name="description" placeholder="图片描述（可选）"></textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="0" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">显示</option>
                <option value="0">隐藏</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交保存</button>
            <a href="/admin/image" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
<script>
document.querySelector('input[name="image"]').addEventListener('change', function() {
    if (this.files && this.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
        };
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
</body>
</html>
