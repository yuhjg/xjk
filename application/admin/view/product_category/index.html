<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card">
    <div class="toolbar">
        <div class="left"><h3 style="font-size:18px;">产品分类管理</h3></div>
        <div class="right">
            <a href="/admin/product_category/add" class="btn btn-success" target="mainFrame">+ 添加分类</a>
        </div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th width="60">ID</th>
                <th>分类名称</th>
                <th width="80">排序</th>
                <th width="80">状态</th>
                <th width="160">操作</th>
            </tr>
        </thead>
        <tbody>
            {volist name="categories" id="cat"}
            <tr>
                <td>{$cat.id}</td>
                <td>{$cat.name}</td>
                <td>{$cat.sort}</td>
                <td>{if condition="$cat.status==1"}<span class="status-tag on">启用</span>{else/}<span class="status-tag off">禁用</span>{/if}</td>
                <td>
                    <div class="actions">
                        <a href="/admin/product_category/edit/{$cat.id}" class="btn btn-primary btn-sm" target="mainFrame">编辑</a>
                        <button onclick="deleteCat({$cat.id})" class="btn btn-danger btn-sm">删除</button>
                    </div>
                </td>
            </tr>
            {/volist}
        </tbody>
    </table>

    <div class="pagination">{$categories|raw}</div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
function deleteCat(id) {
    if (!confirm('确定要删除该分类吗？')) return;
    $.post('/admin/product_category/delete', {id: id}, function(res) {
        if (res.code == 1) {
            alert('删除成功');
            location.reload();
        } else {
            alert(res.msg);
        }
    }, 'json');
}
</script>
</body>
</html>
