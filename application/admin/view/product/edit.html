<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">编辑产品</h3>
    <form id="productForm" method="post" action="/admin/product/edit/{$product.id}" enctype="multipart/form-data">
        <div class="form-group">
            <label>产品名称 <span class="req">*</span></label>
            <input type="text" name="title" value="{$product.title}" placeholder="请输入产品名称" required>
        </div>
        <div class="form-group">
            <label>产品分类 <span class="req">*</span></label>
            <select name="category_id" required>
                <option value="">请选择分类</option>
                {volist name="categoryTree" id="cat"}
                <option value="{$cat.id}" {if condition="$product['category_id']==$cat['id']"}selected{/if}>{$cat.name}</option>
                {volist name="cat.children_list" id="child"}
                <option value="{$child.id}" {if condition="$product['category_id']==$child['id']"}selected{/if}>　└ {$child.name}</option>
                {/volist}
                {/volist}
            </select>
        </div>
        <div class="form-group">
            <label>产品副标题</label>
            <input type="text" name="subtitle" value="{$product.subtitle|default=''}" placeholder="请输入产品副标题">
        </div>
        <div class="form-group">
            <label>产品图片</label>
            {if condition="$product.image"}
            <div style="margin-bottom:8px;"><img src="{$product.image}" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid #eee;"></div>
            {/if}
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <p class="tip">不选择图片则保持原图不变</p>
        </div>
        <div class="form-group">
            <label>产品描述</label>
            <textarea name="description" placeholder="请输入产品简短描述">{$product.description|default=''}</textarea>
        </div>
        <div class="form-group">
            <label>产品详情</label>
            <textarea name="content" style="height:300px;" placeholder="请输入产品详细内容">{$product.content|default=''}</textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="{$product.sort|default='0'}" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1" {if condition="$product.status==1"}selected{/if}>显示</option>
                <option value="0" {if condition="$product.status==0"}selected{/if}>隐藏</option>
            </select>
        </div>
        <div class="form-group">
            <label>推荐</label>
            <select name="is_recommend">
                <option value="0" {if condition="$product.is_recommend==0"}selected{/if}>否</option>
                <option value="1" {if condition="$product.is_recommend==1"}selected{/if}>是</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="/admin/product" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>
