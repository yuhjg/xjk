<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">编辑产品</h3>
    <form id="productForm" method="post" action="/admin/product/edit/{$product.id}" enctype="multipart/form-data">
        <div class="form-group">
            <label>产品名称 <span class="req">*</span></label>
            <input type="text" name="title" value="{$product.title}" placeholder="请输入产品名称" required>
        </div>
        <div class="form-group">
            <label>产品分类 <span class="req">*</span></label>
            <select name="category_id" required>
                <option value="">请选择分类</option>
                {volist name="categoryTree" id="cat"}
                <option value="{$cat.id}" {if condition="$product['category_id']==$cat['id']"}selected{/if}>{$cat.name}</option>
                {volist name="cat.children_list" id="child"}
                <option value="{$child.id}" {if condition="$product['category_id']==$child['id']"}selected{/if}>　└ {$child.name}</option>
                {/volist}
                {/volist}
            </select>
        </div>
        <div class="form-group">
            <label>产品副标题</label>
            <input type="text" name="subtitle" value="{$product.subtitle|default=''}" placeholder="请输入产品副标题">
        </div>
        <div class="form-group">
            <label>产品图片（主图）</label>
            {if condition="$product.image"}
            <div style="margin-bottom:8px;"><img src="{$product.image}" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid #eee;"></div>
            {/if}
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <p class="tip">不选择图片则保持原图不变</p>
        </div>
        <div class="form-group">
            <label>产品多图（最多5张）</label>
            <input type="hidden" name="remove_images" id="removeImages" value="">
            <div id="multiImageUpload">
                <div class="multi-img-row" style="display:flex;gap:10px;flex-wrap:wrap;" id="imageContainer">
                    <!-- 已有图片和新增图片由JS动态渲染 -->
                </div>
                <p class="tip">点击×删除已有图片，点击+号添加新图片，最多5张。</p>
            </div>
        </div>
        <div class="form-group">
            <label>产品描述</label>
            <textarea name="description" placeholder="请输入产品简短描述">{$product.description|default=''}</textarea>
        </div>
        <div class="form-group">
            <label>产品详情</label>
            <textarea name="content" style="height:300px;" placeholder="请输入产品详细内容">{$product.content|default=''}</textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="{$product.sort|default='0'}" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1" {if condition="$product.status==1"}selected{/if}>显示</option>
                <option value="0" {if condition="$product.status==0"}selected{/if}>隐藏</option>
            </select>
        </div>
        <div class="form-group">
            <label>推荐</label>
            <select name="is_recommend">
                <option value="0" {if condition="$product.is_recommend==0"}selected{/if}>否</option>
                <option value="1" {if condition="$product.is_recommend==1"}selected{/if}>是</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="/admin/product" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
<script>
// 已有图片数据（从PHP传过来）
{php}
$existImgArr = [];
if (!empty($product['images'])) {
    $decoded = json_decode($product['images'], true);
    if (is_array($decoded)) {
        $existImgArr = $decoded;
    }
}
echo 'var existImages = ' . json_encode($existImgArr) . ';';
{/php}

var removedIndexes = [];
var maxImages = 5;

function renderImageSlots() {
    var container = document.getElementById('imageContainer');
    container.innerHTML = '';

    // 渲染已有图片
    existImages.forEach(function(src, idx) {
        if (removedIndexes.indexOf(idx) >= 0) return;
        var div = document.createElement('div');
        div.style.cssText = 'width:100px;height:100px;border:2px solid #1a5ca1;border-radius:6px;position:relative;overflow:hidden;';
        div.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;">' +
            '<span onclick="removeExistImg(' + idx + ')" style="position:absolute;top:2px;right:4px;background:rgba(255,0,0,0.7);color:#fff;width:18px;height:18px;border-radius:50%;text-align:center;line-height:16px;cursor:pointer;font-size:14px;">×</span>';
        container.appendChild(div);
    });

    // 计算剩余可添加数量
    var currentCount = existImages.length - removedIndexes.length;
    var remainSlots = maxImages - currentCount;

    // 渲染空位
    for (var i = 0; i < remainSlots; i++) {
        var div = document.createElement('div');
        div.style.cssText = 'width:100px;height:100px;border:2px dashed #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;';
        div.innerHTML = '<span style="color:#bbb;font-size:24px;">+</span>';

        var input = document.createElement('input');
        input.type = 'file';
        input.name = 'images[]';
        input.accept = 'image/jpeg,image/png,image/gif,image/bmp,image/webp';
        input.style.display = 'none';
        input.dataset.slotIndex = i;
        input.addEventListener('change', function() { previewNewImg(this); });

        div.appendChild(input);
        div.addEventListener('click', function() {
            this.querySelector('input[type=file]').click();
        });
        container.appendChild(div);
    }
}

function removeExistImg(idx) {
    if (removedIndexes.indexOf(idx) < 0) {
        removedIndexes.push(idx);
    }
    document.getElementById('removeImages').value = removedIndexes.join(',');
    renderImageSlots();
}

function previewNewImg(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var item = input.parentElement;
            item.style.borderStyle = 'solid';
            item.style.borderColor = '#28a745';
            item.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;">';
            item.appendChild(input);
            item.onclick = null;
            var btn = document.createElement('span');
            btn.innerHTML = '×';
            btn.style.cssText = 'position:absolute;top:2px;right:4px;background:rgba(255,0,0,0.7);color:#fff;width:18px;height:18px;border-radius:50%;text-align:center;line-height:16px;cursor:pointer;font-size:14px;';
            btn.onclick = function(e) {
                e.stopPropagation();
                renderImageSlots();
            };
            item.appendChild(btn);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// 初始化渲染
renderImageSlots();
</script>
</body>
</html>
