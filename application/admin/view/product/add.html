<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">添加产品</h3>
    <form id="productForm" method="post" action="/admin/product/add" enctype="multipart/form-data">
        <div class="form-group">
            <label>产品名称 <span class="req">*</span></label>
            <input type="text" name="title" placeholder="请输入产品名称" required>
        </div>
        <div class="form-group">
            <label>产品分类 <span class="req">*</span></label>
            <select name="category_id" required>
                <option value="">请选择分类</option>
                {volist name="categoryTree" id="cat"}
                <option value="{$cat.id}">{$cat.name}</option>
                {volist name="cat.children_list" id="child"}
                <option value="{$child.id}">　└ {$child.name}</option>
                {/volist}
                {/volist}
            </select>
        </div>
        <div class="form-group">
            <label>产品副标题</label>
            <input type="text" name="subtitle" placeholder="请输入产品副标题">
        </div>
        <div class="form-group">
            <label>产品图片（主图）</label>
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <div id="imagePreview" style="display:none;margin-top:8px;">
                <img id="previewImg" src="" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid #eee;">
            </div>
        </div>
        <div class="form-group">
            <label>产品多图（最多5张）</label>
            <div id="multiImageUpload">
                <div class="multi-img-row" style="display:flex;gap:10px;flex-wrap:wrap;">
                    <div class="multi-img-item" style="width:100px;height:100px;border:2px dashed #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;" onclick="document.getElementById('imgInput0').click()">
                        <span style="color:#bbb;font-size:24px;">+</span>
                        <input type="file" name="images[]" id="imgInput0" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="display:none;" onchange="previewMultiImg(this, 0)">
                    </div>
                    <div class="multi-img-item" style="width:100px;height:100px;border:2px dashed #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;" onclick="document.getElementById('imgInput1').click()">
                        <span style="color:#bbb;font-size:24px;">+</span>
                        <input type="file" name="images[]" id="imgInput1" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="display:none;" onchange="previewMultiImg(this, 1)">
                    </div>
                    <div class="multi-img-item" style="width:100px;height:100px;border:2px dashed #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;" onclick="document.getElementById('imgInput2').click()">
                        <span style="color:#bbb;font-size:24px;">+</span>
                        <input type="file" name="images[]" id="imgInput2" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="display:none;" onchange="previewMultiImg(this, 2)">
                    </div>
                    <div class="multi-img-item" style="width:100px;height:100px;border:2px dashed #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;" onclick="document.getElementById('imgInput3').click()">
                        <span style="color:#bbb;font-size:24px;">+</span>
                        <input type="file" name="images[]" id="imgInput3" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="display:none;" onchange="previewMultiImg(this, 3)">
                    </div>
                    <div class="multi-img-item" style="width:100px;height:100px;border:2px dashed #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;" onclick="document.getElementById('imgInput4').click()">
                        <span style="color:#bbb;font-size:24px;">+</span>
                        <input type="file" name="images[]" id="imgInput4" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="display:none;" onchange="previewMultiImg(this, 4)">
                    </div>
                </div>
                <p class="tip">点击+号上传图片，最多5张。第一张图将作为详情页主图展示。</p>
            </div>
        </div>
        <div class="form-group">
            <label>产品描述</label>
            <textarea name="description" placeholder="请输入产品简短描述"></textarea>
        </div>
        <div class="form-group">
            <label>产品详情</label>
            <textarea name="content" style="height:300px;" placeholder="请输入产品详细内容（支持HTML）"></textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="0" placeholder="数字越小越靠前">
            <p class="tip">数字越小越靠前</p>
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">显示</option>
                <option value="0">隐藏</option>
            </select>
        </div>
        <div class="form-group">
            <label>推荐</label>
            <select name="is_recommend">
                <option value="0">否</option>
                <option value="1">是</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交保存</button>
            <a href="/admin/product" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
<script>
document.querySelector('input[name="image"]').addEventListener('change', function() {
    if (this.files && this.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
        };
        reader.readAsDataURL(this.files[0]);
    }
});

function previewMultiImg(input, index) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var item = input.parentElement;
            item.innerHTML = '';
            item.style.borderStyle = 'solid';
            item.style.borderColor = '#1a5ca1';
            var img = document.createElement('img');
            img.src = e.target.result;
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
            item.appendChild(img);
            var btn = document.createElement('span');
            btn.innerHTML = '×';
            btn.style.cssText = 'position:absolute;top:2px;right:4px;background:rgba(255,0,0,0.7);color:#fff;width:18px;height:18px;border-radius:50%;text-align:center;line-height:16px;cursor:pointer;font-size:14px;';
            btn.onclick = function(e) {
                e.stopPropagation();
                item.innerHTML = '<span style="color:#bbb;font-size:24px;">+</span>';
                item.style.borderStyle = 'dashed';
                item.style.borderColor = '#ddd';
                var newInput = document.createElement('input');
                newInput.type = 'file';
                newInput.name = 'images[]';
                newInput.id = 'imgInput' + index;
                newInput.accept = 'image/jpeg,image/png,image/gif,image/bmp,image/webp';
                newInput.style.display = 'none';
                newInput.onchange = function() { previewMultiImg(this, index); };
                item.appendChild(newInput);
                item.onclick = function() { newInput.click(); };
            };
            item.appendChild(btn);
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</body>
</html>
