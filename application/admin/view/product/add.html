<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">添加产品</h3>
    <form id="productForm" method="post" action="/admin/product/add" enctype="multipart/form-data">
        <div class="form-group">
            <label>产品名称 <span class="req">*</span></label>
            <input type="text" name="title" placeholder="请输入产品名称" required>
        </div>
        <div class="form-group">
            <label>产品分类 <span class="req">*</span></label>
            <select name="category_id" id="categorySelect" required>
                <option value="">请选择分类</option>
                {volist name="categories" id="cat"}
                <option value="{$cat.id}" data-parent="{$cat.parent_id|default=0}">{$cat.name}</option>
                {/volist}
            </select>
        </div>
        <div class="form-group">
            <label>产品副标题</label>
            <input type="text" name="subtitle" placeholder="请输入产品副标题">
        </div>
        <div class="form-group">
            <label>产品图片</label>
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <div id="imagePreview" style="display:none;margin-top:8px;">
                <img id="previewImg" src="" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid #eee;">
            </div>
        </div>
        <div class="form-group">
            <label>产品描述</label>
            <textarea name="description" placeholder="请输入产品简短描述"></textarea>
        </div>
        <div class="form-group">
            <label>产品详情</label>
            <textarea name="content" style="height:300px;" placeholder="请输入产品详细内容（支持HTML）"></textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="0" placeholder="数字越小越靠前">
            <p class="tip">数字越小越靠前</p>
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">显示</option>
                <option value="0">隐藏</option>
            </select>
        </div>
        <div class="form-group">
            <label>推荐</label>
            <select name="is_recommend">
                <option value="0">否</option>
                <option value="1">是</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交保存</button>
            <a href="/admin/product" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
<script>
// 图片预览
document.querySelector('input[name="image"]').addEventListener('change', function() {
    if (this.files && this.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
        };
        reader.readAsDataURL(this.files[0]);
    }
});

// 二级分类分组显示
(function() {
    var sel = document.getElementById('categorySelect');
    if (!sel) return;
    var opts = sel.querySelectorAll('option');
    var parentMap = {};
    opts.forEach(function(opt) {
        var pid = opt.getAttribute('data-parent');
        if (pid && pid !== '0') {
            parentMap[opt.value] = pid;
        }
    });
    // 将二级分类用optgroup或缩进方式显示
    opts.forEach(function(opt) {
        var pid = opt.getAttribute('data-parent');
        if (pid && pid !== '0') {
            // 找到父分类名称
            var parentOpt = sel.querySelector('option[value="' + pid + '"]');
            if (parentOpt) {
                opt.text = '　└ ' + opt.text;
            }
        }
    });
})();
</script>
</body>
</html>
