<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">编辑轮播图</h3>
    <form id="bannerForm" method="post" action="/admin/banner/edit/{$banner.id}" enctype="multipart/form-data">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" value="{$banner.title}" placeholder="请输入轮播图标题">
        </div>
        <div class="form-group">
            <label>副标题</label>
            <input type="text" name="subtitle" value="{$banner.subtitle}" placeholder="请输入副标题">
        </div>
        <div class="form-group">
            <label>轮播图图片</label>
            {if condition="$banner.image"}
            <div style="margin-bottom:8px;"><img src="{$banner.image}" style="max-width:400px;max-height:200px;border-radius:4px;border:1px solid #eee;"></div>
            {/if}
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <p class="tip">不选择图片则保持原图不变</p>
        </div>
        <div class="form-group">
            <label>链接地址</label>
            <input type="text" name="link" value="{$banner.link}" placeholder="点击轮播图跳转的链接">
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="{$banner.sort|default='0'}" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1" {if condition="$banner.status==1"}selected{/if}>显示</option>
                <option value="0" {if condition="$banner.status==0"}selected{/if}>隐藏</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="/admin/banner" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>
