<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">添加轮播图</h3>
    <form id="bannerForm" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" placeholder="请输入轮播图标题">
        </div>
        <div class="form-group">
            <label>副标题</label>
            <input type="text" name="subtitle" placeholder="请输入副标题">
        </div>
        <div class="form-group">
            <label>轮播图图片</label>
            <div class="upload-box" id="imageBox" style="width:100%;height:200px;">
                <div class="placeholder">
                    <div class="icon">📷</div>
                    <p>点击上传图片（建议尺寸 1920×500）</p>
                </div>
                <input type="file" name="image" id="imageInput" accept="image/*" onchange="previewImage(this, 'imageBox')">
            </div>
        </div>
        <div class="form-group">
            <label>链接地址</label>
            <input type="text" name="link" placeholder="点击轮播图跳转的链接">
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="0" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">显示</option>
                <option value="0">隐藏</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交保存</button>
            <a href="/admin/banner" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
function previewImage(input, boxId) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var box = document.getElementById(boxId);
            var fileInput = input;
            box.innerHTML = '';
            var img = document.createElement('img');
            img.src = e.target.result;
            box.appendChild(img);
            box.appendChild(fileInput);
        };
        reader.readAsDataURL(input.files[0]);
    }
}
$('#bannerForm').on('submit', function(e) {
    e.preventDefault();
    var formData = new FormData(this);
    $.ajax({
        url: '/admin/banner/add',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        headers: {'X-Requested-With': 'XMLHttpRequest'},
        success: function(res) {
            if (res.code == 1) {
                alert('添加成功');
                window.location.href = '/admin/banner';
            } else {
                alert(res.msg || '添加失败');
            }
        },
        error: function(xhr) { alert('提交失败，请重试'); }
    });
});
</script>
</body>
</html>
