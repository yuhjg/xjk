<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">添加轮播图</h3>
    <form id="bannerForm" method="post" action="/admin/banner/add" enctype="multipart/form-data">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" placeholder="请输入轮播图标题">
        </div>
        <div class="form-group">
            <label>副标题</label>
            <input type="text" name="subtitle" placeholder="请输入副标题">
        </div>
        <div class="form-group">
            <label>轮播图图片</label>
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <div id="imagePreview" style="display:none;margin-top:8px;">
                <img id="previewImg" src="" style="max-width:400px;max-height:200px;border-radius:4px;border:1px solid #eee;">
            </div>
            <p class="tip">建议尺寸 1920×500</p>
        </div>
        <div class="form-group">
            <label>链接地址</label>
            <input type="text" name="link" placeholder="点击轮播图跳转的链接">
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="0" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">显示</option>
                <option value="0">隐藏</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交保存</button>
            <a href="/admin/banner" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
<script>
document.querySelector('input[name="image"]').addEventListener('change', function() {
    if (this.files && this.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
        };
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
</body>
</html>
