<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">添加新闻</h3>
    <form id="newsForm" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>新闻标题 <span class="req">*</span></label>
            <input type="text" name="title" placeholder="请输入新闻标题" required>
        </div>
        <div class="form-group">
            <label>新闻分类 <span class="req">*</span></label>
            <select name="category_id" required>
                <option value="">请选择分类</option>
                {volist name="categories" id="cat"}
                <option value="{$cat.id}">{$cat.name}</option>
                {/volist}
            </select>
        </div>
        <div class="form-group">
            <label>作者</label>
            <input type="text" name="author" value="admin" placeholder="请输入作者">
        </div>
        <div class="form-group">
            <label>封面图</label>
            <div class="upload-box" id="imageBox">
                <div class="placeholder">
                    <div class="icon">📷</div>
                    <p>点击上传图片</p>
                </div>
                <input type="file" name="image" id="imageInput" accept="image/*" onchange="previewImage(this, 'imageBox')">
            </div>
        </div>
        <div class="form-group">
            <label>摘要</label>
            <textarea name="description" placeholder="请输入新闻摘要">{$news.description|default=''}</textarea>
        </div>
        <div class="form-group">
            <label>新闻内容 <span class="req">*</span></label>
            <textarea name="content" style="height:300px;" placeholder="请输入新闻内容（支持HTML）"></textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="0" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">显示</option>
                <option value="0">隐藏</option>
            </select>
        </div>
        <div class="form-group">
            <label>置顶</label>
            <select name="is_top">
                <option value="0">否</option>
                <option value="1">是</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交保存</button>
            <a href="/admin/news" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
function previewImage(input, boxId) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var box = document.getElementById(boxId);
            var fileInput = input;
            box.innerHTML = '';
            var img = document.createElement('img');
            img.src = e.target.result;
            box.appendChild(img);
            box.appendChild(fileInput);
        };
        reader.readAsDataURL(input.files[0]);
    }
}
$('#newsForm').on('submit', function(e) {
    e.preventDefault();
    var formData = new FormData(this);
    $.ajax({
        url: '/admin/news/add',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        headers: {'X-Requested-With': 'XMLHttpRequest'},
        success: function(res) {
            if (res.code == 1) {
                alert('添加成功');
                window.location.href = '/admin/news';
            } else {
                alert(res.msg || '添加失败');
            }
        },
        error: function(xhr) { alert('提交失败，请重试'); }
    });
});
</script>
</body>
</html>
