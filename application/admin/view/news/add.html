<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="content-card form-page">
    <h3 style="font-size:18px;margin-bottom:24px;">添加新闻</h3>
    <form id="newsForm" method="post" action="/admin/news/add" enctype="multipart/form-data">
        <div class="form-group">
            <label>新闻标题 <span class="req">*</span></label>
            <input type="text" name="title" placeholder="请输入新闻标题" required>
        </div>
        <div class="form-group">
            <label>新闻分类 <span class="req">*</span></label>
            <select name="category_id" required>
                <option value="">请选择分类</option>
                {volist name="categories" id="cat"}
                <option value="{$cat.id}">{$cat.name}</option>
                {/volist}
            </select>
        </div>
        <div class="form-group">
            <label>作者</label>
            <input type="text" name="author" value="admin" placeholder="请输入作者">
        </div>
        <div class="form-group">
            <label>封面图</label>
            <input type="file" name="image" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" style="margin-bottom:10px;">
            <div id="imagePreview" style="display:none;margin-top:8px;">
                <img id="previewImg" src="" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid #eee;">
            </div>
        </div>
        <div class="form-group">
            <label>摘要</label>
            <textarea name="description" placeholder="请输入新闻摘要"></textarea>
        </div>
        <div class="form-group">
            <label>新闻内容 <span class="req">*</span></label>
            <textarea name="content" style="height:300px;" placeholder="请输入新闻内容（支持HTML）"></textarea>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" name="sort" value="0" placeholder="数字越小越靠前">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">显示</option>
                <option value="0">隐藏</option>
            </select>
        </div>
        <div class="form-group">
            <label>置顶</label>
            <select name="is_top">
                <option value="0">否</option>
                <option value="1">是</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交保存</button>
            <a href="/admin/news" class="btn" style="background:#eee;margin-left:12px;">返回列表</a>
        </div>
    </form>
</div>
<script>
document.querySelector('input[name="image"]').addEventListener('change', function() {
    if (this.files && this.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
        };
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
</body>
</html>
